<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thông tin sinh viên</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }
        .container {
            background: white;
            padding: 40px;
            border-radius: 10px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
            text-align: center;
        }
        h1 {
            color: #333;
            margin-bottom: 30px;
        }
        .info {
            margin: 20px 0;
            font-size: 18px;
        }
        .label {
            font-weight: bold;
            color: #667eea;
        }
        .value {
            color: #333;
            margin-left: 10px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Thông tin sinh viên</h1>
        <div class="info">
            <span class="label">Tên:</span>
            <span class="value">Nguyễn Văn Trường</span>
        </div>
        <div class="info">
            <span class="label">MSSV:</span>
            <span class="value">22280603498</span>
        </div>
    </div>
</body>
</html>
