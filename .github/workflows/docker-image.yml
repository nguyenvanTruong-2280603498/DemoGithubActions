name: Build and Push Docker Image

on:
  push:
    branches: ["main"]
  workflow_dispatch:

jobs:
  docker:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Resolve Docker Hub credentials
        id: creds
        shell: bash
        run: |
          USERNAME="${{ secrets.DOCKERHUB_USERNAME }}"
          TOKEN="${{ secrets.DOCKERHUB_TOKEN }}"

          if [ -z "$USERNAME" ]; then USERNAME="${{ secrets.DOCKER_USERNAME }}"; fi
          if [ -z "$TOKEN" ]; then TOKEN="${{ secrets.DOCKER_PASSWORD }}"; fi

          if [ -z "$USERNAME" ] || [ -z "$TOKEN" ]; then
            echo "Missing Docker Hub credentials."
            echo "Use DOCKERHUB_USERNAME + DOCKERHUB_TOKEN (recommended), or DOCKER_USERNAME + DOCKER_PASSWORD."
            exit 1
          fi

          echo "username=$USERNAME" >> "$GITHUB_OUTPUT"
          echo "token=$TOKEN" >> "$GITHUB_OUTPUT"

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ steps.creds.outputs.username }}
          password: ${{ steps.creds.outputs.token }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.creds.outputs.username }}/demogithubaction:latest
