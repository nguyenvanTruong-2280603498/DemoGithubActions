name: Build and Push Docker Image

on:
  push:
    branches: ["main"]
  workflow_dispatch:

jobs:
  docker:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Resolve Docker Hub credentials
        id: creds
        shell: bash
        run: |
          U1="${{ secrets.DOCKER_USERNAME }}"
          P1="${{ secrets.DOCKER_PASSWORD }}"
          U2="${{ secrets.DOCKERHUB_USERNAME }}"
          P2="${{ secrets.DOCKERHUB_TOKEN }}"

          echo "DOCKER_USERNAME set: $([ -n "$U1" ] && echo yes || echo no)"
          echo "DOCKER_PASSWORD set: $([ -n "$P1" ] && echo yes || echo no)"
          echo "DOCKERHUB_USERNAME set: $([ -n "$U2" ] && echo yes || echo no)"
          echo "DOCKERHUB_TOKEN set: $([ -n "$P2" ] && echo yes || echo no)"

          USERNAME="$U1"
          TOKEN="$P1"
          if [ -z "$USERNAME" ]; then USERNAME="$U2"; fi
          if [ -z "$TOKEN" ]; then TOKEN="$P2"; fi

          # Remove accidental CR/LF from copied secret values.
          USERNAME="${USERNAME//$'\r'/}"
          USERNAME="${USERNAME//$'\n'/}"
          TOKEN="${TOKEN//$'\r'/}"
          TOKEN="${TOKEN//$'\n'/}"

          if [ -z "$USERNAME" ] || [ -z "$TOKEN" ]; then
            echo "Missing Docker Hub credentials. Set either:"
            echo "- DOCKER_USERNAME + DOCKER_PASSWORD"
            echo "- or DOCKERHUB_USERNAME + DOCKERHUB_TOKEN"
            exit 1
          fi

          echo "username=$USERNAME" >> "$GITHUB_OUTPUT"
          echo "token=$TOKEN" >> "$GITHUB_OUTPUT"

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ steps.creds.outputs.username }}
          password: ${{ steps.creds.outputs.token }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.creds.outputs.username }}/demogithubaction:latest
